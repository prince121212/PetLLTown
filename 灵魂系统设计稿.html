<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宠物小小镇 - 小程序UI设计稿</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 20px; }

.page-title { color: #fff; font-size: 20px; font-weight: 700; }
.page-desc { color: #666; font-size: 12px; margin-bottom: 12px; }
.screens { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; }
.screen-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.screen-label { color: #888; font-size: 12px; }

.page-title { color: #fff; font-size: 20px; font-weight: 700; }
.page-desc { color: #666; font-size: 12px; margin-bottom: 12px; }

/* 手机壳 */
.phone { width: 375px; height: 812px; background: #000; border-radius: 44px; position: relative; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 0 0 2px #333; }
.phone::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 150px; height: 28px; background: #000; border-radius: 0 0 16px 16px; z-index: 100; }
.screen { width: 100%; height: 100%; position: relative; overflow: hidden; }

/* 背景 */
.home-bg { position: absolute; inset: 0; background: linear-gradient(180deg, #0a0e1a 0%, #0d1220 40%, #111828 100%); }

/* 顶部：宠物名 + 提示（左上） */
.home-top { position: absolute; top: 58px; left: 28px; z-index: 10; }
.home-name { font-size: 28px; font-weight: 800; color: #f8fbff; line-height: 1.1; }
.home-hint { font-size: 12px; color: rgba(248,251,255,0.6); margin-top: 4px; font-weight: 600; }

/* 左侧抽屉（设置按钮 + 状态面板） */
.left-drawer { position: absolute; top: 100px; left: 0px; z-index: 10; display: flex; align-items: flex-start; transition: transform 0.3s ease; }
.left-drawer .drawer-content { display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.08); border-left: none; border-radius: 0 10px 10px 0; padding: 10px 12px; }
.left-drawer .drawer-tab { width: 24px; height: 48px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.08); border-left: none; border-radius: 0 8px 8px 0; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); font-size: 10px; flex-shrink: 0; align-self: center; }
.left-drawer.open { transform: translateX(0); }
.left-drawer.closed { transform: translateX(-100%); margin-right: -100%; }
.left-drawer.closed .drawer-tab { position: absolute; left: 100%; top: 50%; transform: translateY(-50%); }

/* 设置按钮 */
.home-settings { width: 52px; height: 24px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: rgba(248,251,255,0.8); font-size: 11px; }

/* 状态面板 */
.status-panel { display: flex; flex-direction: column; gap: 5px; }
.status-row { display: flex; align-items: center; gap: 5px; }
.status-icon { font-size: 10px; width: 14px; text-align: center; }
.status-bar { width: 44px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.status-fill { height: 100%; border-radius: 2px; }
.status-fill.energy { background: #4ecdc4; }
.status-fill.boredom { background: #ff6b6b; }
.status-fill.affection { background: #ffd93d; }
.status-val { font-size: 9px; color: rgba(255,255,255,0.3); width: 16px; }
.relationship-row { display: flex; align-items: center; gap: 4px; margin-top: 3px; }
.relationship-icon { font-size: 12px; }
.relationship-text { font-size: 9px; color: rgba(248,251,255,0.35); }
.mood-row { margin-top: 2px; font-size: 10px; color: #4ecdc4; }

/* 宠物舞台 */
.home-stage { position: absolute; left: 50%; top: 130px; bottom: 200px; transform: translateX(-50%); width: 280px; display: flex; align-items: flex-end; justify-content: center; }
.pet-placeholder { width: 240px; height: 320px; border: 2px dashed rgba(255,255,255,0.08); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.15); font-size: 11px; flex-direction: column; gap: 8px; }
.pet-icon { font-size: 48px; opacity: 0.2; }

/* 底部交互区 */
.home-bottom { position: absolute; left: 0; right: 0; bottom: 34px; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10; }
.voice-hint-text { font-size: 12px; color: rgba(248,251,255,0.6); font-weight: 700; }
.pet-reply-text { font-size: 12px; color: rgba(200,230,255,0.8); max-width: 280px; text-align: center; }

/* 光球 */
.orb { width: 56px; height: 56px; border-radius: 50%; background: #07101b; box-shadow: 0 12px 30px rgba(25,39,56,0.3), inset 0 0 0 1px rgba(255,255,255,0.08); position: relative; overflow: hidden; }
.orb-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle, rgba(100,140,255,0.3) 0%, rgba(100,140,255,0.05) 50%, transparent 70%); }

/* 场景标签 */
.scene-label { position: absolute; bottom: 195px; left: 50%; transform: translateX(-50%); font-size: 9px; color: rgba(255,255,255,0.25); background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 6px; z-index: 10; }
</style>
</head>
<body>

<div class="page-title">宠物小小镇 — 小程序 UI 设计稿</div>
<div class="page-desc">左侧抽屉：状态面板 + 设置按钮，可收起/展开</div>

<div class="screens">

<!-- 展开状态 -->
<div class="screen-wrap">
<div class="screen-label">面板展开</div>
<div class="phone">
<div class="screen">
  <div class="home-bg"></div>
  <div class="home-top">
    <div class="home-name">小团子</div>
    <div class="home-hint">它在听你说话</div>
  </div>
  <div class="left-drawer open">
    <div class="drawer-content">
      <div class="home-settings">⚙ 设置</div>
      <div class="status-panel">
        <div class="status-row"><span class="status-icon">⚡</span><div class="status-bar"><div class="status-fill energy" style="width:72%"></div></div><span class="status-val">72</span></div>
        <div class="status-row"><span class="status-icon">💭</span><div class="status-bar"><div class="status-fill boredom" style="width:35%"></div></div><span class="status-val">35</span></div>
        <div class="status-row"><span class="status-icon">💛</span><div class="status-bar"><div class="status-fill affection" style="width:60%"></div></div><span class="status-val">60</span></div>
        <div class="relationship-row"><span class="relationship-icon">🔥</span><span class="relationship-text">连续3天</span></div>
        <div class="mood-row">😊 开心</div>
      </div>
    </div>
    <div class="drawer-tab">‹</div>
  </div>
  <div class="home-stage">
    <div class="pet-placeholder"><span class="pet-icon">🐱</span>宠物视频</div>
  </div>
  <div class="scene-label">● 待机</div>
  <div class="home-bottom">
    <span class="voice-hint-text">按住和小团子说话</span>
    <div class="orb"><div class="orb-glow"></div></div>
  </div>
</div>
</div>
</div>

<!-- 收起状态 -->
<div class="screen-wrap">
<div class="screen-label">面板收起</div>
<div class="phone">
<div class="screen">
  <div class="home-bg"></div>
  <div class="home-top">
    <div class="home-name">小团子</div>
    <div class="home-hint">它在听你说话</div>
  </div>
  <div class="left-drawer closed">
    <div class="drawer-content">
      <div class="home-settings">⚙ 设置</div>
      <div class="status-panel">
        <div class="status-row"><span class="status-icon">⚡</span><div class="status-bar"><div class="status-fill energy" style="width:72%"></div></div><span class="status-val">72</span></div>
        <div class="status-row"><span class="status-icon">💭</span><div class="status-bar"><div class="status-fill boredom" style="width:35%"></div></div><span class="status-val">35</span></div>
        <div class="status-row"><span class="status-icon">💛</span><div class="status-bar"><div class="status-fill affection" style="width:60%"></div></div><span class="status-val">60</span></div>
        <div class="relationship-row"><span class="relationship-icon">🔥</span><span class="relationship-text">连续3天</span></div>
        <div class="mood-row">😊 开心</div>
      </div>
    </div>
    <div class="drawer-tab">›</div>
  </div>
  <div class="home-stage">
    <div class="pet-placeholder"><span class="pet-icon">🐱</span>宠物视频</div>
  </div>
  <div class="scene-label">● 待机</div>
  <div class="home-bottom">
    <span class="voice-hint-text">按住和小团子说话</span>
    <div class="orb"><div class="orb-glow"></div></div>
  </div>
</div>
</div>
</div>

</div>

</body>
</html>
